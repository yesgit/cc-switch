name: Flatpak Build

on: [workflow_dispatch]

jobs:
  build:
    name: Build Flatpak
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: cc-switch:temp
          cache-from: type=gha,scope=cc-switch-fp4
          cache-to: type=gha,mode=max,scope=cc-switch-fp4
          push: false

      - run: |
          docker create --name cc-tmp cc-switch:temp
          docker cp cc-tmp:/out/cc-switch.deb ./cc-switch.deb
          docker rm cc-tmp
          test -f cc-switch.deb || (echo "ERROR: no .deb" >&2; exit 1)

      - run: |
          mkdir -p app-files
          cd app-files
          ar x ../cc-switch.deb
          tar xf data.tar.*
          rm -f data.tar.* control.tar.* debian-binary
          cd ..
          test -f app-files/usr/bin/cc-switch || (echo "ERROR: binary missing" >&2; exit 1)

      - run: |
          rm -f app-files/usr/share/applications/*.desktop
          cp flatpak/com.ccswitch.desktop.desktop app-files/usr/share/applications/com.ccswitch.desktop.desktop
          cp flatpak/com.ccswitch.desktop.metainfo.xml app-files/usr/share/metainfo/com.ccswitch.desktop.metainfo.xml
          cp src-tauri/icons/128x128.png app-files/usr/share/icons/hicolor/128x128/apps/com.ccswitch.desktop.png

      - run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends flatpak
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y --noninteractive flathub org.gnome.Platform//46 org.gnome.Sdk//46

      - run: |
          VERSION=$(node -p "require('./package.json').version")
          APP=$(mktemp -d)
          REPO=$(mktemp -d)

          mkdir -p "$APP/files"
          cp -a app-files/usr/* "$APP/files/"
          chmod -R a+rX "$APP"

          cat > "$APP/metadata" << 'META'
[Application]
name=com.ccswitch.desktop
runtime=org.gnome.Platform/x86_64/46
sdk=org.gnome.Sdk/x86_64/46
command=cc-switch
META

          cat "$APP/metadata"
          ls "$APP/files/bin/"
          file "$APP/files/bin/cc-switch"

          flatpak build-export "$REPO" "$APP"
          mkdir -p output
          flatpak build-bundle "$REPO" "output/CC-Switch-${VERSION}-Linux.flatpak" com.ccswitch.desktop
          ls -la output/

      - uses: actions/upload-artifact@v7
        with:
          name: CC-Switch-Linux-Flatpak
          path: output/*.flatpak
          if-no-files-found: error
