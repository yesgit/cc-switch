name: Docker Build (Self-contained AppImage)

on:
  workflow_dispatch:
    inputs:
      push_to_registry:
        description: 'Push Docker image to ghcr.io'
        type: boolean
        default: false
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build AppImage via Docker
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: cc-switch:ubuntu20-compat
          cache-from: type=gha,scope=cc-switch-docker-v2
          cache-to: type=gha,mode=max,scope=cc-switch-docker-v2
          # Only tag images, don't push yet
          push: false

      - name: Extract AppImage from Docker image
        run: |
          mkdir -p output
          docker run --rm -v "$(pwd)/output:/out" cc-switch:ubuntu20-compat
          echo "=== AppImage contents ==="
          ls -la output/
          # Set output for next steps
          APPFILE=$(ls output/*.AppImage 2>/dev/null | head -1)
          if [ -z "$APPFILE" ]; then
            echo "ERROR: No AppImage found in output/" >&2
            exit 1
          fi
          echo "appimage=$APPFILE" >> $GITHUB_ENV
          echo "✅ AppImage: $APPFILE"

      - name: Verify AppImage compatibility
        run: |
          APPFILE="${{ env.appimage }}"
          echo "=== Extracting AppImage ==="
          # Docker copies file as root; chmod may fail if not executable yet
          chmod +x "$APPFILE" 2>/dev/null || sudo chmod +x "$APPFILE" 2>/dev/null || true
          "$APPFILE" --appimage-extract
          BINARY="squashfs-root/usr/bin/cc-switch"

          echo "=== 1. Checking for missing library dependencies ==="
          if ldd "$BINARY" 2>&1 | grep "not found"; then
            echo "❌ Missing libraries detected!"
            exit 1
          fi
          echo "✅ All libraries resolved"

          echo "=== 2. Checking cc-switch binary TLS backend ==="
          ldd "$BINARY" 2>&1 | grep -iE "ssl|tls" || echo "(none linked directly)"

          echo "=== 3. Required GLIBC version ==="
          # Extract all GLIBC symbol versions from binary + bundled libs
          MAX_GLIBC=$( (readelf -s "$BINARY" 2>/dev/null; for lib in squashfs-root/usr/lib/*.so*; do readelf -s "$lib" 2>/dev/null; done) \
            | grep -oP 'GLIBC_\d+\.\d+' | sort -Vu | tail -1)
          echo "Maximum GLIBC required: ${MAX_GLIBC:-unknown}"
          case "$MAX_GLIBC" in
            GLIBC_2.[0-9]|GLIBC_2.[0-2][0-9]|GLIBC_2.3[01])
              echo "✅ Compatible with Ubuntu 20.04 (GLIBC 2.31)";;
            *)
              echo "⚠️  May need newer GLIBC than Ubuntu 20.04 provides (≥ ${MAX_GLIBC})";;
          esac

          echo "=== 4. Bundled libraries ==="
          ls squashfs-root/usr/lib/ 2>/dev/null | head -30 || echo "(no bundled libs dir)"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v7
        with:
          name: CC-Switch-Ubuntu20.04-Compatible-AppImage
          path: output/*.AppImage
          if-no-files-found: error

      - name: Log in to ghcr.io
        if: github.event_name != 'workflow_dispatch' || inputs.push_to_registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image to ghcr.io
        if: github.event_name != 'workflow_dispatch' || inputs.push_to_registry
        run: |
          # Tag with version (from git tag) and latest
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="latest"
          fi
          docker tag cc-switch:ubuntu20-compat ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$VERSION
          docker tag cc-switch:ubuntu20-compat ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:ubuntu20-compat
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$VERSION
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:ubuntu20-compat
          echo "✅ Pushed to ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
