name: Flatpak Build (Ubuntu 20.04+ Compatible)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Flatpak
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: cc-switch:temp
          cache-from: type=gha,scope=cc-switch-flatpak
          cache-to: type=gha,mode=max,scope=cc-switch-flatpak
          push: false

      - name: Extract .deb from Docker image
        run: |
          docker create --name cc-switch-temp cc-switch:temp
          docker cp cc-switch-temp:/out/. flatpak/
          docker rm cc-switch-temp
          ls -la flatpak/
          # Manifest expects a .deb at flatpak/cc-switch.deb
          DEB=$(ls flatpak/*.deb | head -1)
          test -f "$DEB" || (echo "ERROR: No .deb found" >&2 && exit 1)
          # If the .deb has a different name, rename it to match the manifest
          cp "$DEB" flatpak/cc-switch.deb
          echo "✅ .deb ready: flatpak/cc-switch.deb"

      - name: Install flatpak-builder and GNOME 46 runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y --noninteractive flathub \
            org.gnome.Platform//46 \
            org.gnome.Sdk//46

      - name: Build Flatpak bundle
        run: |
          flatpak-builder \
            --force-clean \
            --repo=flatpak-repo \
            --install-deps-from=flathub \
            flatpak-build-dir \
            flatpak/com.ccswitch.desktop.yml

      - name: Export Flatpak bundle
        run: |
          mkdir -p output
          VERSION=$(node -p "require('./package.json').version")
          flatpak build-bundle \
            flatpak-repo \
            "output/CC-Switch-${VERSION}-Linux.flatpak" \
            com.ccswitch.desktop
          ls -la output/

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v7
        with:
          name: CC-Switch-Linux-Flatpak
          path: output/*.flatpak
          if-no-files-found: error
