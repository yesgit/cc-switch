name: Flatpak Build (Ubuntu 20.04+ Compatible)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Flatpak
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: cc-switch:temp
          cache-from: type=gha,scope=cc-switch-flatpak-v2
          cache-to: type=gha,mode=max,scope=cc-switch-flatpak-v2
          push: false

      - name: Extract .deb from Docker
        run: |
          docker create --name cc-tmp cc-switch:temp
          docker cp cc-tmp:/out/cc-switch.deb ./cc-switch.deb 2>/dev/null || \
            docker cp cc-tmp:/out/. ./
          docker rm cc-tmp
          ls -la ./
          test -f cc-switch.deb || (echo "ERROR: no .deb" >&2 && exit 1)
          echo "✅ .deb extracted"

      - name: Extract .deb contents
        run: |
          mkdir -p app-dir
          cd app-dir
          ar x ../cc-switch.deb
          tar xf data.tar.*
          rm data.tar.* control.tar.* debian-binary
          echo "✅ .deb extracted to app-dir/"

      - name: Install Flatpak
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends flatpak
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y --noninteractive flathub \
            org.gnome.Platform//46 \
            org.gnome.Sdk//46

      - name: Assemble Flatpak application
        run: |
          VERSION=$(node -p "require('./package.json').version")
          # Use temp dir to avoid flatpak init conflicts
          APP_DIR=$(mktemp -d)
          mkdir -p "$APP_DIR/files"

          # Copy all .deb contents into flatpak app
          cp -a app-dir/usr "$APP_DIR/files/"

          # Remove upstream desktop file, use ours
          rm -f "$APP_DIR/files/share/applications/"*.desktop
          mkdir -p "$APP_DIR/files/share/applications"
          mkdir -p "$APP_DIR/files/share/icons/hicolor/128x128/apps"
          mkdir -p "$APP_DIR/files/share/metainfo"

          cp flatpak/com.ccswitch.desktop.desktop "$APP_DIR/files/share/applications/com.ccswitch.desktop.desktop"
          cp flatpak/com.ccswitch.desktop.metainfo.xml "$APP_DIR/files/share/metainfo/com.ccswitch.desktop.metainfo.xml"
          cp src-tauri/icons/128x128.png "$APP_DIR/files/share/icons/hicolor/128x128/apps/com.ccswitch.desktop.png"

          echo "=== Init flatpak app ==="
          flatpak build-init "$APP_DIR" com.ccswitch.desktop org.gnome.Sdk org.gnome.Platform 46

          echo "=== Finishing ==="
          flatpak build-finish \
            --socket=wayland --socket=fallback-x11 \
            --socket=pulseaudio --share=ipc --share=network \
            --device=dri \
            --talk-name=org.kde.StatusNotifierWatcher \
            --filesystem=xdg-run/tray-icon:create \
            --filesystem=home \
            --command=cc-switch \
            "$APP_DIR"

          echo "=== Exporting to repo ==="
          flatpak build-export flatpak-repo "$APP_DIR"
          mkdir -p output
          flatpak build-bundle flatpak-repo "output/CC-Switch-${VERSION}-Linux.flatpak" com.ccswitch.desktop
          ls -la output/
          echo "✅ Flatpak bundle created"

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v7
        with:
          name: CC-Switch-Linux-Flatpak
          path: output/*.flatpak
          if-no-files-found: error
